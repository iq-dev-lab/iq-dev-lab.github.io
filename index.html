    .brand-iq{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px}

    .h-desc em{color:var(--center);font-style:normal;font-weight:400}
    .h-stats{margin-left:auto;display:flex;gap:24px}
    .stat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--center);line-height:1;text-align:center}
    .stat-l{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-align:center}
    #gw{position:fixed;inset:0;z-index:1}
    #graph{width:100%;height:100%;cursor:grab}
    #graph:active{cursor:grabbing}
    #legend{position:fixed;bottom:26px;left:36px;z-index:20;display:flex;flex-direction:column;gap:6px}
    .li{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    #hint{position:fixed;bottom:26px;right:36px;z-index:20;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--muted);text-align:right;line-height:1.9}

    .ttf{display:flex;align-items:center;justify-content:space-between}

    #tt-link{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-decoration:none}

<script>
(function(){const c=document.getElementById('stars'),ctx=c.getContext('2d');let S=[];function resize(){c.width=innerWidth;c.height=innerHeight;S=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.1+.15,a:Math.random()*.5+.08,da:(Math.random()-.5)*.003}));}function draw(){ctx.clearRect(0,0,c.width,c.height);S.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(.04,Math.min(.65,s.a)).toFixed(2)})`;ctx.fill();s.a+=s.da;if(s.a>.6||s.a<.05)s.da*=-1;});requestAnimationFrame(draw);}resize();draw();addEventListener('resize',resize);})();

const REPOS=[
  {id:'jvm',cat:'java',short:'JVM Deep Dive',label:'JVM Deep Dive',icon:IC.java,docs:69,url:'https://github.com/iq-dev-lab/jvm-deep-dive',desc:'JVM 내부 구조 완전 해부 — 클래스 로딩·GC·JIT·메모리 모델, CPU 레벨 성능 분석'},

  {id:'sd',cat:'spring',short:'Spring Data & Tx',label:'Spring Data & Transaction',icon:IC.spring,docs:45,url:'https://github.com/iq-dev-lab/spring-data-transaction',desc:'Spring Data JPA 내부 구조, 트랜잭션 관리, Hibernate 통합, 쿼리 성능 튜닝'},
  {id:'sba',cat:'spring',short:'Spring Batch',label:'Spring Batch Deep Dive',icon:IC.spring,docs:35,url:'https://github.com/iq-dev-lab/spring-batch-deep-dive',desc:'ChunkOrientedTasklet 완전 분해, ItemReader·Processor·Writer, Partitioning'},
  {id:'scl',cat:'spring',short:'Spring Cloud',label:'Spring Cloud Deep Dive',icon:IC.spring,docs:40,url:'https://github.com/iq-dev-lab/spring-cloud-deep-dive',desc:'분산 시스템 내부 — Config Server, Eureka, Gateway, Circuit Breaker, 분산 추적'},

  {id:'my',cat:'database',short:'MySQL',label:'MySQL Deep Dive',icon:IC.mysql,docs:38,url:'https://github.com/iq-dev-lab/mysql-deep-dive',desc:'실행계획 분석·튜닝, 파티션 프루닝, Binary Log 포맷, Replication Lag 원인 분석'},

const W=innerWidth,H=innerHeight,CX=W/2,CY=H/2;
const HUB_D=Math.min(W,H)*.265,REPO_D=Math.min(W,H)*.165;
const FAN=150,NODE_R=19;
function rad(d){return d*Math.PI/180;}
function buildGraph(){
  const nodes=[],links=[],byId={};
  const cn={id:'center',type:'center',x:CX,y:CY};
  nodes.push(cn);byId['center']=cn;
  Object.entries(CATS).forEach(([cat,meta])=>{
    const hr=rad(meta.angle),hx=CX+HUB_D*Math.cos(hr),hy=CY+HUB_D*Math.sin(hr);
    const hId='hub-'+cat;
    const hub={id:hId,type:'hub',cat,label:meta.label,x:hx,y:hy};
    nodes.push(hub);byId[hId]=hub;
    links.push({s:'center',t:hId,hub:true});
    const reps=REPOS.filter(r=>r.cat===cat),n=reps.length;
    reps.forEach((repo,i)=>{
      const half=(n-1)/2,step=n>1?FAN/(n-1):0;
      const rr=rad(meta.angle+(i-half)*step);
      const rx=hx+REPO_D*Math.cos(rr),ry=hy+REPO_D*Math.sin(rr);
      const node={...repo,type:'repo',x:rx,y:ry};
      nodes.push(node);byId[repo.id]=node;
      links.push({s:hId,t:repo.id,hub:false});
    });
  });
  return{nodes,links,byId};
}
const{nodes,links,byId}=buildGraph();
const svg=d3.select('#graph').attr('viewBox',`0 0 ${W} ${H}`);
const root=svg.append('g');
const zoom=d3.zoom().scaleExtent([.22,3.8]).on('zoom',e=>root.attr('transform',e.transform));
svg.call(zoom);
svg.call(zoom.transform,d3.zoomIdentity.translate(W*(1-.62)/2,H*(1-.62)/2).scale(.62));
const defs=svg.append('defs');
const rg=defs.append('radialGradient').attr('id','cglow').attr('cx','50%').attr('cy','50%').attr('r','50%');
rg.append('stop').attr('offset','0%').attr('stop-color','#CBD5E1').attr('stop-opacity',.12);
rg.append('stop').attr('offset','100%').attr('stop-color','#CBD5E1').attr('stop-opacity',0);
Object.keys(C).forEach(k=>{
  const f=defs.append('filter').attr('id',`gl-${k}`).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','6').attr('result','blur');
  const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');
});
REPOS.forEach(repo=>{defs.append('clipPath').attr('id','clip-'+repo.id).append('circle').attr('r',NODE_R-3);});
root.append('g').selectAll('line').data(links).join('line')
.attr('x1',d=>byId[d.s].x).attr('y1',d=>byId[d.s].y).attr('x2',d=>byId[d.t].x).attr('y2',d=>byId[d.t].y)
.attr('stroke',d=>{const n=byId[d.t];return n.cat?C[n.cat]:C.center;})
.attr('stroke-width',d=>d.hub?1.4:1.1).attr('stroke-opacity',d=>d.hub?.48:.44).attr('stroke-dasharray',d=>d.hub?'none':'5,4')
.style('opacity',0).transition().duration(1200).delay(600).style('opacity',1);
const nodeG=root.append('g').selectAll('g').data(nodes).join('g').attr('transform',d=>`translate(${d.x},${d.y})`);
nodeG.each(function(d){
  const g=d3.select(this);
  const col=d.type==='center'?C.center:C[d.cat];
  const gid=d.type==='center'?'center':d.cat;
  if(d.type==='center'){
    g.append('circle').attr('r',75).attr('fill','url(#cglow)');
    g.append('circle').attr('r',56).attr('fill','none').attr('stroke',col).attr('stroke-opacity',.1).attr('stroke-width',1).attr('stroke-dasharray','4,7');
    g.append('circle').attr('r',44).attr('fill','rgba(203,213,225,.05)').attr('stroke',col).attr('stroke-opacity',.42).attr('stroke-width',1.5).attr('filter',`url(#gl-${gid})`);
    g.append('text').attr('y',-6).attr('text-anchor','middle').attr('font-family','Bebas Neue,sans-serif').attr('font-size','21px').attr('letter-spacing','5px').attr('fill',col).attr('opacity',.88).text('IQ');
    g.append('text').attr('y',14).attr('text-anchor','middle').attr('font-family','Bebas Neue,sans-serif').attr('font-size','21px').attr('letter-spacing','5px').attr('fill',col).attr('opacity',.88).text('LAB');
    g.append('text').attr('y',31).attr('text-anchor','middle').attr('font-family','JetBrains Mono,monospace').attr('font-size','7.5px').attr('letter-spacing','3px').attr('fill',col).attr('opacity',.3).text('IQ DEV LAB');
  }else if(d.type==='hub'){
    g.append('circle').attr('r',27).attr('fill',col+'14').attr('stroke',col).attr('stroke-opacity',.58).attr('stroke-width',1.3).attr('filter',`url(#gl-${gid})`);
    const shorts={java:'Java',spring:'Spring',database:'Database',messaging:'Kafka',infra:'Infra'};
    g.append('text').attr('y',44).attr('text-anchor','middle').attr('font-family','JetBrains Mono,monospace').attr('font-size','9.5px').attr('letter-spacing','1.5px').attr('fill',col).attr('opacity',.72).text(shorts[d.cat]||d.cat);
  }else{
    const r=NODE_R,wip=d.wip;
    g.append('circle').attr('r',r).attr('fill',col+'22').attr('stroke',col).attr('stroke-opacity',wip?.22:.55).attr('stroke-width',wip?.8:1.2).attr('stroke-dasharray',wip?'2.5,3':'none');
    if(d.icon){
      if(d.darkIcon)g.append('circle').attr('r',NODE_R-3).attr('fill','rgba(255,255,255,.88)').attr('clip-path',`url(#clip-${d.id})`);
      g.append('image').attr('href',d.icon).attr('x',-(r-3)).attr('y',-(r-3)).attr('width',(r-3)*2).attr('height',(r-3)*2).attr('clip-path',`url(#clip-${d.id})`).attr('opacity',wip?.3:.65).attr('preserveAspectRatio','xMidYMid meet');
    }
    const hub=byId['hub-'+d.cat];
    const dx=d.x-hub.x,dy=d.y-hub.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/len,ny=dy/len,lx=nx*(r+8),ly=ny*(r+8);
    const anchor=Math.abs(nx)<.22?'middle':(nx>0?'start':'end');
    g.append('text').attr('x',lx).attr('y',ly+4).attr('text-anchor',anchor).attr('font-family','JetBrains Mono,monospace').attr('font-size','9px').attr('fill',col).attr('opacity',wip?.38:.72).text(d.short);
    if(wip)g.append('text').attr('x',lx).attr('y',ly+16).attr('text-anchor',anchor).attr('font-family','JetBrains Mono,monospace').attr('font-size','7px').attr('fill','#F97316').attr('opacity',.6).text('WIP');
    g.style('cursor','pointer')
    .on('mouseenter',function(e,nd){d3.select(this).select('circle').attr('stroke-opacity',1).attr('r',r+2.5).attr('filter',`url(#gl-${nd.cat})`);d3.select(this).select('image').attr('opacity',1);showTT(e,nd);})
    .on('mousemove',moveTT)
    .on('mouseleave',function(e,nd){d3.select(this).select('circle').attr('stroke-opacity',nd.wip?.22:.55).attr('r',r).attr('filter',null);d3.select(this).select('image').attr('opacity',nd.wip?.3:.65);hideTT();})
    .on('click',(e,nd)=>{if(nd.url)window.open(nd.url,'_blank');});
  }
});
nodeG.style('opacity',0).transition().duration(800).delay((d,i)=>300+i*28).style('opacity',1);
const tt=document.getElementById('tt');
function showTT(e,d){
  const col=C[d.cat]||'';
  document.getElementById('tt-cat').style.color=col;
  document.getElementById('tt-cat').textContent=CATS[d.cat]?.label||'';
  document.getElementById('tt-name').textContent=d.label+(d.wip?'  🚧':'');
  document.getElementById('tt-desc').textContent=d.desc||'';
  document.getElementById('tt-docs').textContent=d.docs?`📄 ${d.docs}개 문서`:'';
  const lnk=document.getElementById('tt-link');lnk.href=d.url||'#';lnk.style.color=col;
  moveTT(e);tt.style.opacity='1';
}
function moveTT(e){let x=e.clientX+18,y=e.clientY-8;if(x+278>innerWidth)x=e.clientX-278-10;if(y+190>innerHeight)y=e.clientY-190;tt.style.left=x+'px';tt.style.top=y+'px';}
function hideTT(){tt.style.opacity='0';}
setTimeout(()=>{const intro=document.getElementById('intro');intro.style.opacity='0';setTimeout(()=>intro.remove(),900);},700);
</script>
